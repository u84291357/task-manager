<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タスク管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>タスク管理</h1>
        <p>localStorage利用</p>
      </div>

      <nav class="menu" aria-label="メインメニュー">
        <button id="menuAddTaskBtn" class="menu-btn active" type="button">タスク追加</button>
        <button id="menuTaskViewBtn" class="menu-btn" type="button">タスク一覧</button>
        <button id="menuBackupBtn" class="menu-btn" type="button">バックアップ</button>
      </nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <h2 id="pageTitle">タスク追加</h2>
        <p id="pageDescription" class="subtext">新しいタスクを登録します。</p>
      </header>

      <section id="addTaskSection" class="page-section panel">
        <h3>タスク追加</h3>
        <div class="form-grid">
          <div class="field field-span-2">
            <label for="title">タスク名</label>
            <input type="text" id="title" placeholder="例: 設計書レビュー" />
          </div>

          <div class="field">
            <label for="due">期限</label>
            <input type="date" id="due" />
          </div>

          <div class="field">
            <label for="priority">優先度</label>
            <select id="priority">
              <option value="高">高</option>
              <option value="中" selected>中</option>
              <option value="低">低</option>
            </select>
          </div>

          <div class="field field-span-2">
            <label for="category">カテゴリー</label>
            <div class="category-row">
              <select id="category"></select>
              <input type="text" id="newCategory" placeholder="新しいカテゴリー名" />
              <button id="addCategoryBtn" type="button" class="secondary">カテゴリ追加</button>
            </div>
          </div>

          <div class="field field-span-2">
            <label for="memo">メモ</label>
            <textarea id="memo" rows="10" placeholder="補足メモ"></textarea>
          </div>
        </div>

        <div class="actions">
          <button id="addBtn">追加</button>
        </div>
      </section>

      <section id="taskViewSection" class="page-section hidden-view">
        <section class="panel">
          <h3>表示切替</h3>
          <div class="view-switch">
            <button id="showListViewBtn" type="button">一覧表示</button>
            <button id="showCalendarViewBtn" type="button" class="secondary">カレンダー表示</button>
          </div>
        </section>

        <section id="filterPanel" class="panel">
          <h3>検索・絞り込み・並び替え</h3>

          
          <div class="toolbar-grid">
            <div class="field">
              <label for="categoryFilter">カテゴリー</label>
              <select id="categoryFilter">
                <option value="all">すべて</option>
              </select>
            </div>

            <div class="field">
              <label for="searchText">検索</label>
              <input type="text" id="searchText" placeholder="タスク名・メモで検索" />
            </div>

            <div class="field">
              <label for="statusFilter">状態</label>
              <select id="statusFilter">
                <option value="all">すべて</option>
                <option value="open">未完了のみ</option>
                <option value="done">完了のみ</option>
              </select>
            </div>

            <div class="field">
              <label for="priorityFilter">優先度</label>
              <select id="priorityFilter">
                <option value="all">すべて</option>
                <option value="高">高</option>
                <option value="中">中</option>
                <option value="低">低</option>
              </select>
            </div>

            <div class="field">
              <label for="sortOrder">並び替え</label>
              <select id="sortOrder">
                <option value="created_desc">登録日（新しい順）</option>
                <option value="created_asc">登録日（古い順）</option>
                <option value="due_asc">期限（日付昇順）</option>
                <option value="due_desc">期限（日付降順）</option>
                <option value="priority_desc">優先度（高→低）</option>
                <option value="priority_asc">優先度（低→高）</option>
                <option value="title_asc">タスク名（昇順）</option>
                <option value="title_desc">タスク名（降順）</option>
              </select>
            </div>
          </div>
        </section>

        <section id="listViewSection" class="panel">
          <div class="task-header-row">
            <h3>タスク一覧</h3>
            <div class="summary-actions">
              <div id="summary" class="summary"></div>
              <button id="clearDateFilterBtn" type="button" class="secondary hidden-view">日付絞り込み解除</button>
              <button id="clearCompletedBtn" class="danger" type="button">完了タスク削除</button>
            </div>
          </div>
          <div id="taskList" class="task-list"></div>
        </section>

        <section id="calendarViewSection" class="panel hidden-view">
          <div class="calendar-header-row">
            <h3>カレンダー</h3>
            <div class="calendar-controls">
              <button id="prevMonthBtn" type="button" class="secondary">◀</button>
              <div id="calendarTitle" class="calendar-title"></div>
              <button id="nextMonthBtn" type="button" class="secondary">▶</button>
              <button id="todayMonthBtn" type="button">今月</button>
            </div>
          </div>

          <div class="calendar-weekdays">
            <div>日</div>
            <div>月</div>
            <div>火</div>
            <div>水</div>
            <div>木</div>
            <div>金</div>
            <div>土</div>
          </div>

          <div id="calendarGrid" class="calendar-grid"></div>
          <p class="note">期限が設定されているタスクを、期限日に表示します。</p>
        </section>
      </section>

      <section id="backupSection" class="page-section panel hidden-view">
        <h3>バックアップ</h3>
        <div class="actions wrap">
          <button id="exportBtn" class="secondary">JSONバックアップ出力</button>
          <button id="importBtn" class="secondary">JSONバックアップ読込</button>
          <input type="file" id="importFile" accept=".json,application/json" hidden />
        </div>
        <p class="note">
          localStorage はブラウザのサイトデータ削除で消える可能性があります。必要に応じて JSON バックアップを保存してください。
        </p>
      </section>
    </main>
  </div>

  <div id="editModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
      <div class="modal-header">
        <h2 id="editModalTitle">タスク編集</h2>
        <button id="closeModalBtn" class="icon-btn" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="modal-body">
        <div class="form-grid">
          <div class="field field-span-2">
            <label for="editTitle">タスク名</label>
            <input type="text" id="editTitle" />
          </div>

          <div class="field">
            <label for="editDue">期限</label>
            <input type="date" id="editDue" />
          </div>

          <div class="field">
            <label for="editPriority">優先度</label>
            <select id="editPriority">
              <option value="高">高</option>
              <option value="中">中</option>
              <option value="低">低</option>
            </select>
          </div>

          <div class="field field-span-2">
            <label for="editCategory">カテゴリー</label>
            <select id="editCategory"></select>
          </div>

          <div class="field field-span-2">
            <label for="editMemo">メモ</label>
            <textarea id="editMemo" rows="10"></textarea>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button id="cancelEditBtn" class="secondary" type="button">キャンセル</button>
        <button id="saveEditBtn" type="button">保存</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
